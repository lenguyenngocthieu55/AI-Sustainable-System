    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2D6A4F;
            --primary-light: #40916C;
            --primary-dark: #1B4D3E;
            --secondary: #52B788;
            --accent: #95D5B2;
            --background: #F8F9FA;
            --text: #2D3E3F;
            --error: #D62828;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 20px 30px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .api-status {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            font-size: 12px;
            margin-top: 8px;
        }

        .api-status.connected {
            background: rgba(46, 204, 113, 0.3);
        }

        .api-status.disconnected {
            background: rgba(231, 76, 60, 0.3);
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #F8F9FA;
        }

        .message {
            margin: 20px 0;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            line-height: 1.6;
        }

        .user-message .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot-message .message-content {
            background: white;
            color: var(--text);
            border-bottom-left-radius: 5px;
            border-left: 4px solid var(--primary);
        }

        .message-sender {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.5;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: white;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 2px solid var(--accent);
            display: flex;
            gap: 15px;
        }

        .input-wrapper {
            flex: 1;
            background: var(--background);
            border-radius: 50px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: none;
            padding: 12px 0;
            outline: none;
            font-size: 15px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover:not(:disabled) {
            transform: scale(1.1);
            background: var(--primary-dark);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;

            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);

            gap: 10px;
            overflow-x: auto;

            border-radius: 50px;
            font-size: 13px;
            color: var(--primary-dark);

            cursor: pointer;

            margin-top: 5px;

            border-top: 1px dashed #ddd;
        }

                max-width: 90%;
            }
        }
    </style>

        class EcoWiseBot {
            constructor() {
                this.chatBox = document.getElementById('chatBox');
                this.userInput = document.getElementById('userInput');
                this.sendBtn = document.getElementById('sendBtn');
                this.apiStatus = document.getElementById('apiStatus');
                this.history = [];
                this.isLoading = false;
                this.apiAvailable = false;
                
                this.init();
                this.checkAPI();
            }

            async checkAPI() {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    
                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: 'ping',
                            test: true 
                        }),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        this.apiAvailable = true;
                        this.apiStatus.textContent = '🟢 Kết nối AI thành công';
                        this.apiStatus.className = 'api-status connected';
                    } else {
                        throw new Error('API not responding');
                    }
                } catch (error) {
                    this.apiAvailable = false;
                    this.apiStatus.textContent = '🔴 Đang dùng kiến thức nội bộ (AI offline)';
                    this.apiStatus.className = 'api-status disconnected';
                    
                    // Still show welcome message
                    this.addMessage(this.getLocalResponse('general'), 'bot');
                }
            }

            init() {
                this.userInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !this.isLoading) {
                        this.send();
                    }
                });

                // Initial message
                if (!this.apiAvailable) {
                    this.addMessage(this.getLocalResponse('general'), 'bot');
                }
            }

            useSuggestion(text) {
                this.userInput.value = text;
                this.send();
            }

            async send() {
                const message = this.userInput.value.trim();
                if (!message || this.isLoading) return;

                this.userInput.value = '';
                
                // Add user message
                this.addMessage(message, 'user');
                
                // Add to history
                this.history.push({ role: 'user', content: message });

                // Try API if available
                if (this.apiAvailable) {
                    await this.callAPI(message);
                } else {
                    // Use local response
                    setTimeout(() => {
                        const response = this.getSmartLocalResponse(message);
                        this.addMessage(response, 'bot');
                        this.history.push({ role: 'assistant', content: response });
                    }, 1000);
                    
                    this.showTyping();
                    setTimeout(() => this.removeTyping(), 800);
                }
            }

            async callAPI(message) {
                this.isLoading = true;
                this.sendBtn.disabled = true;
                this.showTyping();

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);

                try {
                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: message,
                            history: this.history.slice(-10)
                        }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error('API error');

                    const data = await response.json();
                    
                    this.removeTyping();
                    this.addMessage(data.reply, 'bot');
                    this.history.push({ role: 'assistant', content: data.reply });

                } catch (error) {
                    clearTimeout(timeoutId);
                    this.removeTyping();
                    
                    // Fallback to local
                    const localResponse = this.getSmartLocalResponse(message);
                    this.addMessage(localResponse + '\n\n*Đang dùng kiến thức nội bộ do kết nối chậm*', 'bot');
                    this.history.push({ role: 'assistant', content: localResponse });
                    
                    // Update API status
                    this.apiAvailable = false;
                    this.apiStatus.textContent = '🔴 Đang dùng kiến thức nội bộ';
                    this.apiStatus.className = 'api-status disconnected';

                } finally {
                    this.isLoading = false;
                    this.sendBtn.disabled = false;
                    this.userInput.focus();
                }
            }

            getSmartLocalResponse(message) {
                const lowerMsg = message.toLowerCase();
                
                // Phân tích intent từ câu hỏi
                if (lowerMsg.includes('chào') || lowerMsg.includes('hello') || lowerMsg.includes('hi')) {
                    return this.getLocalResponse('general');
                }
                
                if (lowerMsg.includes('cảm ơn') || lowerMsg.includes('thank')) {
                    return 'Cảm ơn bạn! Rất vui được giúp đỡ. Bạn còn thắc mắc gì về sống xanh không? 🌱';
                }
                
                if (lowerMsg.includes('điện') || lowerMsg.includes('năng lượng') || lowerMsg.includes('mặt trời')) {
                    return this.getLocalResponse('energy');
                }
                
                if (lowerMsg.includes('rác') || lowerMsg.includes('phân loại') || lowerMsg.includes('tái chế') || lowerMsg.includes('nhựa')) {
                    return this.getLocalResponse('waste');
                }
                
                if (lowerMsg.includes('nước') || lowerMsg.includes('tiết kiệm nước')) {
                    return this.getLocalResponse('water');
                }
                
                if (lowerMsg.includes('ăn') || lowerMsg.includes('thực phẩm') || lowerMsg.includes('chay')) {
                    return this.getLocalResponse('food');
                }
                
                if (lowerMsg.includes('vườn') || lowerMsg.includes('trồng') || lowerMsg.includes('cây') || lowerMsg.includes('rau')) {
                    return this.getLocalResponse('garden');
                }
                
                if (lowerMsg.includes('xe') || lowerMsg.includes('đi lại') || lowerMsg.includes('di chuyển')) {
                    return this.getLocalResponse('transport');
                }
                
                if (lowerMsg.includes('nhà') || lowerMsg.includes('căn hộ') || lowerMsg.includes('phòng')) {
                    return this.getLocalResponse('home');
                }
                
                if (lowerMsg.includes('khí hậu') || lowerMsg.includes('nóng lên') || lowerMsg.includes('trái đất')) {
                    return this.getLocalResponse('climate');
                }
                
                // Default response
                return this.getLocalResponse('general');
            }

            getLocalResponse(category) {
                const responses = LOCAL_RESPONSES[category] || LOCAL_RESPONSES.general;
                if (Array.isArray(responses)) {
                    return responses[Math.floor(Math.random() * responses.length)];
                }
                return responses;
            }

            addMessage(text, sender, isError = false) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                if (isError) {
                    contentDiv.classList.add('error-message');
                }
                
                const senderDiv = document.createElement('div');
                senderDiv.className = 'message-sender';
                senderDiv.innerHTML = sender === 'user' ? 
                    '<i class="fas fa-user"></i> Bạn' : 
                    '<i class="fas fa-robot"></i> Giáo sư AI';
                
                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                
                // Format text
                const formattedText = text
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/•/g, '•');
                
                const paragraphs = formattedText.split('<br><br>');
                textDiv.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = new Date().toLocaleTimeString('vi-VN', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                contentDiv.appendChild(senderDiv);
                contentDiv.appendChild(textDiv);
                contentDiv.appendChild(timeDiv);
                messageDiv.appendChild(contentDiv);
                
                this.chatBox.appendChild(messageDiv);
                this.scrollToBottom();
            }

            showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message bot-message';
                typingDiv.id = 'typingIndicator';
                
                const indicatorDiv = document.createElement('div');
                indicatorDiv.className = 'typing-indicator';
                indicatorDiv.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
                
                typingDiv.appendChild(indicatorDiv);
                this.chatBox.appendChild(typingDiv);
                this.scrollToBottom();
            }

            removeTyping() {
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
            }

            scrollToBottom() {
                this.chatBox.scrollTop = this.chatBox.scrollHeight;
            }
        }

        // Initialize chatbot
        const chatBot = new EcoWiseBot();
    </script>
</body>
</html>
